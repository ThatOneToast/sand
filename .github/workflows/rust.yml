name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Set up Java 21 for stable codegen
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # No `target/` build-artifact cache here by design (see #280 item 1):
      # this repo's own cache usage grew to ~12 GiB across three
      # `Linux-cargo-build-*` entries (one per distinct Cargo.lock hash,
      # ~3-4 GiB each — Cargo.lock changes on nearly every PR, so
      # `restore-keys` fallback meant each new lockfile hash both restored a
      # stale multi-GiB blob *and* saved a fresh one, unbounded), pushing the
      # repo past GitHub's 10 GiB per-repo cache cap and, on this job
      # specifically, past the runner's actual free disk — extracting a
      # ~4 GiB cache tarball into `target/` before *any* of this job's own
      # compilation even starts left too little headroom for the
      # stable+latest codegen test builds, clippy, build, workspace tests,
      # macro trybuild, and rustdoc steps below (all sharing one `target/`)
      # to complete, and the runner's own worker process crashed trying to
      # flush its diagnostic log once the disk was actually full. The Cargo
      # registry cache above is unaffected by this — it is small (~30 MiB)
      # and does not grow per-lockfile the same way. If build-artifact
      # caching is reintroduced, key it narrowly (e.g. per-crate
      # `target/*/incremental` only) and monitor `gh api
      # /repos/<owner>/<repo>/actions/cache/usage` rather than caching the
      # whole `target/` directory again.

      - name: Check available disk space
        run: df -h /

      - name: Resolve verified codegen targets
        id: codegen-versions
        shell: bash
        run: |
          stable="$(cargo run --quiet -p sand-version --bin codegen-ci-version -- stable)"
          latest="$(cargo run --quiet -p sand-version --bin codegen-ci-version -- latest)"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "cache-key=$stable-$latest" >> "$GITHUB_OUTPUT"

      - name: Cache verified Minecraft data
        uses: actions/cache@v4
        with:
          path: ~/.sand/cache
          key: ${{ runner.os }}-sand-minecraft-${{ steps.codegen-versions.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-sand-minecraft-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Vanilla harness orchestration tests
        run: |
          bash -n scripts/validate-vanilla-reload.sh
          python3 -m unittest scripts.tests.test_vanilla_reload_harness

      - name: Generated API health (stable ${{ steps.codegen-versions.outputs.stable }})
        env:
          SAND_MC_VERSION: ${{ steps.codegen-versions.outputs.stable }}
          SAND_STRICT_CODEGEN: "1"
        run: cargo test -p sand-core generated_api_health --lib

      - name: Set up Java 25 for latest verified codegen
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Generated API health (latest verified ${{ steps.codegen-versions.outputs.latest }})
        env:
          SAND_MC_VERSION: ${{ steps.codegen-versions.outputs.latest }}
          SAND_STRICT_CODEGEN: "1"
        run: cargo test -p sand-core generated_api_health --lib

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Workspace tests
        run: cargo test --workspace --all-features --verbose

      - name: Macro trybuild tests
        run: cargo test -p sand-macros --verbose

      - name: Rustdoc
        run: cargo doc --workspace --all-features --no-deps

  book:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show active-toolchain

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build book
        run: scripts/build-book.sh
