# Sand capability manifest — machine-readable capability inventory.
#
# Handwritten and reviewed alongside source (not code-generated). Do not
# treat absence of a capability id as evidence it doesn't exist — search
# source before assuming a gap. For exhaustive per-registry / per-trigger
# detail, this file points at the two Rust-owned coverage tables instead of
# duplicating them:
#   - sand-components/src/registry_coverage.rs  (REGISTRY_COVERAGE, TAG_COVERAGE)
#   - sand-components/src/advancement/trigger_coverage.rs (TRIGGER_COVERAGE)
#
# Status enum: implemented | partial | experimental | raw_only | planned |
#              intentionally_unsupported | vanilla_impossible | unknown
schema_version: 1
last_reviewed: "2026-07-12"

capabilities:

  - id: functions
    name: "Typed functions"
    category: authoring-core
    intent: "Register a Rust function as a generated .mcfunction file."
    status: implemented
    stability: stable
    crates: [sand-macros, sand-core]
    entry_points: ["#[function]"]
    preferred_api: "sand_macros::function"
    minecraft: {minimum: "1.18.0", maximum_verified: "26.2.0"}
    examples: ["examples/basic_typed.rs"]
    evidence: ["sand-macros/src/lib.rs", "sand-core/src/function.rs"]

  - id: load-tick-components
    name: "Load and tick components"
    category: authoring-core
    intent: "Auto-register a function into minecraft:load or minecraft:tick function tags, or a custom tag."
    status: implemented
    stability: stable
    crates: [sand-macros, sand-core]
    entry_points: ["#[component(Load)]", "#[component(Tick)]", "#[component(Tag = \"ns:name\")]"]
    minecraft: {minimum: "1.18.0", maximum_verified: "26.2.0"}
    examples: ["examples/basic_typed.rs", "examples/state_and_conditions.rs"]
    evidence: ["sand-macros/src/lib.rs", "sand-core/src/state (register_load_objective, register_tick_handler)"]

