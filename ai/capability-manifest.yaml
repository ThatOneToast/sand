    preferred_api: "sand_components::advancement::AdvancementTrigger"
    minecraft: {minimum: "1.18.0", maximum_verified: "26.2.0"}
    sand_limitations: >
      1 of 51 known vanilla trigger IDs (minecraft:leveled_up) is
      intentionally_unsupported (not a real vanilla registry entry as of
      1.21.11; generates a migration diagnostic pointing to tick-based XP
      polling). All others are FullyImplemented. Full per-trigger status:
      sand-components/src/advancement/trigger_coverage.rs (TRIGGER_COVERAGE,
      53 rows). Do not assume a trigger exists by name pattern — check that
      table first.
    evidence: ["sand-components/src/advancement/trigger_coverage.rs"]

