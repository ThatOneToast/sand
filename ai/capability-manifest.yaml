  - id: sandevent-chained-dispatch
    name: "Same-cycle chained SandEvent dispatch"
    category: events
    intent: "Declare that a custom SandEvent fires only from another SandEvent's successful dispatch cycle (same tick, same execution subject/position), reusing the parent's detector instead of independently re-polling it."
    status: partial
    stability: alpha
    crates: [sand-core, sand-macros]
    entry_points: ["SandEventDispatch::chain::<Parent>()", "SandEventDispatch::compose().after::<Parent>()"]
    preferred_api: "SandEventDispatch::chain::<Parent>().when(...).unless(...).if_(...) inside a SandEvent::dispatch() impl; use compose().after::<Parent>() when combining several occurrence clauses"
    sand_limitations: >
      Same-cycle chain dispatch graphs. Implemented: typed single-parent
      occurrence clauses; direct and indirect mixed-edge cycles are rejected
      at export time with a readable diagnostic path, never a panic; the
      parent's detector/setup is generated and shared
      exactly once regardless of how many direct #[event] handlers and chain
      children subscribe to it, even when the parent has no direct handler
      of its own; the child inherits the parent's player @s and position (no
      re-issued `execute as @a`); deterministic handler/child-edge fan-out
      ordering; distinct concrete identity for generic child families (e.g.
      ElevatorUsed<GoUp> vs ElevatorUsed<GoDown>); multi-plan child
      conditions are coalesced with a per-player guard so a child fires at
      most once per parent invocation; a chained child's own
      pre_observation/post_observation run around its condition test on
      every parent invocation (post_observation always reached, whether or
      not the condition matched) via a dedicated observe function, at every
      chain depth. Both structured `SandEventDispatch::tick()` and legacy
      `SandEventDispatch::TickCondition` parents are supported and resolve
      to the same graph node/detector regardless of which constructor was
      used. A sole advancement-backed SandEvent parent is covered by
      sandevent-advancement-graph-parent (#240 Phase 6); every other
      advancement-backed occurrence shape (after_any/after_all, combined
      with a second occurrence clause) is explicitly rejected (export error
      naming the child/parent). Multi-parent same-cycle groups are covered by
      sandevent-multi-parent-composition. Bounded `.within(...)` cross-tick
      correlation is covered by sandevent-bounded-correlation. Deferred to
      later phases of #240: participant-rich execution contexts (#230) and
      arbitrary non-player entity execution scopes.
    evidence: ["sand-core/src/events/mod.rs (ChainEventDispatch, SandEventDispatch::chain, SandEventDispatch::Chain)", "sand-core/src/events/graph.rs (EventGraph, EventNode, NodeOrigin, discover_node, cycle detection)", "sand-core/src/component.rs (build_dispatch_function, build_child_edge)", "sand-macros/src/lib.rs (#[event] make_chain descriptor factory)", "sand-core/tests/event_chain_export.rs", "sand-core/tests/event_chain_legacy_tick_condition_parent.rs", "sand-core/tests/event_chain_child_lifecycle.rs", "sand-core/tests/event_chain_cycle.rs", "sand-core/tests/event_chain_advancement_parent_rejected.rs", "sand-macros/tests/cases/pass_sand_event_chain_dispatch.rs", "sand-macros/tests/cases/fail_sand_event_chain_non_sand_event_parent.rs"]
    documentation: ["book/src/manual/events.md (Same-cycle and persistent composition)"]

  - id: sandevent-advancement-graph-parent
    name: "Advancement-backed SandEvent graph parents"
    category: events
    intent: "Allow an advancement-backed SandEvent to participate as a typed graph parent, bridged directly from its own vanilla advancement reward function rather than polled by the tick coordinator, without duplicating its detector or losing the triggering player's execution context."
    status: partial
    stability: alpha
    crates: [sand-core, sand-macros]
    entry_points: ["ChainEventDispatch::after::<AdvancementParent>()", "SandEventDispatch::chain::<AdvancementParent>()"]
    preferred_api: "SandEventDispatch::chain::<AdvancementParent>() (or compose().after::<AdvancementParent>()) as the child's sole occurrence clause; combine with while_/when/unless as needed"
    sand_limitations: >
      Phase 6 of #240. An advancement-backed SandEvent may be a graph parent
      only as a child's sole `after::<Parent>()` occurrence dependency —
      never inside `after_any`/`after_all`, never combined with a second
      occurrence clause, and never referenced by `.within(...)`, because
      Sand does not control (and will not misrepresent) the advancement
      reward function's execution order relative to the tick coordinator's
      own tick-tagged pass; each of those combinations is rejected at export
      with a diagnostic naming the child, the parent, and the operator
      rather than silently approximated. `.while_(...)`, `.when(...)`, and
      `.unless(...)` remain fully supported and are evaluated inline, no
      coordinator involvement required. An advancement-backed parent is
      never inserted as a graph node (see `EventGraph::advancement_bridges`)
      — its detection stays owned by a synthesized advancement + reward
      entry function pair, generated exactly once regardless of how many
      children depend on it; each dependent's condition-gated dispatch call
      is appended directly into that entry function, executed synchronously
      under the triggering player's exact `@s`, immediately after the
      existing revoke-first ordering (the advancement always re-arms before
      any dependent runs, so it can retrigger on the next criterion match
      regardless of what a dependent's own condition does). No pending flag,
      queue, or next-tick delay is introduced. `TickScope::AdvancementPlayer`
      is the graph's capability seam distinguishing this from tick-polled
      `TickScope::Players`: both guarantee an exact player subject, but only
      `Players` supports coordinator-mediated multi-parent/staged
      composition. The bridged parent type must have zero direct #[event]
      handlers in this phase — combining a direct handler with graph
      composition on the same advancement-backed type is rejected (it would
      otherwise require either a second live advancement grant for one
      criterion, or splicing into the separate, pre-existing per-handler
      advancement lowering path, both out of scope here). The bridged
      parent's own SandEvent::setup() must also be empty
      (EventSetup::is_empty(), checked during graph discovery before any
      datapack records are emitted) — the synchronous bridge dispatches the
      dependent directly from the parent's reward entry and never runs the
      parent's own setup lifecycle (objectives/pre_observation/
      post_observation), so a non-empty setup is rejected with a diagnostic
      naming the child, the parent, and the specific non-empty category
      (EventSetup::first_non_empty_category()) rather than silently
      discarded. The dependent child's own EventSetup and
      while_/when/unless conditions are unaffected — only the parent's
      lifecycle is restricted; executing an advancement parent's own
      lifecycle synchronously remains unimplemented future work requiring
      new ordering semantics not designed in this phase. Multiple children
      may depend on one bridged parent; multiple distinct advancement-backed
      parents remain distinct. Generated command shape, revoke/entry
      ordering, provider-only subscription, multi-child sharing, every
      rejected combination's diagnostics (including each non-empty setup
      category), and deterministic diagnostic selection under mixed
      non-empty setup have automated export-test evidence. A
      structurally-verified fixture (SemanticAdvancementParent /
      SemanticAdvancementBridgeChild) exports cleanly and deterministically
      for both 1.21.4 and 26.2, but has no dedicated client-driven
      positive/negative timing test in this phase — see LIM-VAL-007; real
      advancement-firing semantics for this specific bridge remain
      export/structural evidence only. Participant-rich
      execution contexts (#230) and arbitrary non-player entity execution
      scopes remain unimplemented (Phase 7+).
    evidence: ["sand-core/src/events/mod.rs (TickScope::AdvancementPlayer, SameCycleEventDependency::event_revoke, EventSetup::is_empty, EventSetup::first_non_empty_category)", "sand-core/src/events/graph.rs (AdvancementBridge, EventGraph::advancement_bridges, resolve_occurrence_dependencies advancement branch, occurrence_topological_order exclusion, empty-setup validation)", "sand-core/src/component.rs (advancement-backed graph parent bridge codegen, advancement_handler_type_ids collision guard, key_registry collision guard)", "sand-core/tests/event_chain_advancement_parent_rejected.rs", "sand-core/tests/event_chain_advancement_parent_composition.rs", "sand-core/tests/event_chain_advancement_parent_after_any_rejected.rs", "sand-core/tests/event_chain_advancement_parent_combined_occurrence_rejected.rs", "sand-core/tests/event_chain_advancement_parent_within_rejected.rs", "sand-core/tests/event_chain_advancement_parent_direct_handler_rejected.rs", "sand-core/tests/event_chain_advancement_parent_setup_objectives_rejected.rs", "sand-core/tests/event_chain_advancement_parent_setup_pre_observation_rejected.rs", "sand-core/tests/event_chain_advancement_parent_setup_post_observation_rejected.rs", "sand-core/tests/event_chain_advancement_parent_setup_mixed_rejected.rs", "sand-vanilla-audit/src/lib.rs (SemanticAdvancementParent, SemanticAdvancementBridgeChild)"]
    documentation: ["docs/events.md", "book/src/manual/events.md", "docs/architecture.md"]

  - id: sandevent-multi-parent-composition
    name: "Multi-parent same-cycle SandEvent composition"
    category: events
    intent: "Require any or all of several typed SandEvent parents to have fired for one inherited subject during the current event cycle, with deterministic at-most-once coalescing and detector reuse."
    status: partial
    stability: alpha
    crates: [sand-core, sand-macros]
    entry_points: ["SandEventDispatch::compose()", "ChainEventDispatch::after::<E>()", "ChainEventDispatch::after_any::<(A, B)>()", "ChainEventDispatch::after_all::<(A, B)>()", "SandEventDispatch::after_any::<(A, B)>()", "SandEventDispatch::after_all::<(A, B)>()"]
    preferred_api: "SandEventDispatch::after_any::<(A, B)>() or SandEventDispatch::after_all::<(A, B)>() inside SandEvent::dispatch(); use compose() to combine occurrence clauses with while_, when, and unless"
    sand_limitations: >
      Phase 4 of #240. `after_any` and `after_all` accept tuples of two through
      eight concrete SandEvent types. All occurrence clauses are conjunctive;
      disjunction applies only within one `after_any` tuple. A definition may
      contain at most one any-group and one all-group. Duplicate parents,
      repeated groups, empty/unsupported tuple arities, self-dependencies,
      incompatible scopes, identity collisions, and direct/indirect mixed-edge
      cycles are rejected. Occurrence-only parents are subscribed and each
      detector/setup is emitted once; persistent-only providers remain
      unsubscribed. Required occurrence marks reset each event cycle, are keyed
      to inherited player @s, are established before deterministic topological
      child evaluation, and cannot cross subjects or ticks. `after_any`
      coalesces several matching parents to at most one child dispatch per
      subject per cycle; `after_all` requires every distinct parent. Generated
      command shape and subject isolation have automated export evidence. A
      real 1.21.4 protocol-client fixture proves each any-parent positive path,
      all-parent positive/negative paths, at-most-once coalescing when both
      parents change atomically, parent-order independence, repeated-one-parent
      rejection, and no stale occurrence on the following tick. Multiplayer
      isolation remains structural rather than a two-client runtime claim.
      Bounded `.within(...)` cross-tick correlation is covered by
      sandevent-bounded-correlation. Advancement-backed graph parents,
      participant contexts, and arbitrary non-player scopes remain
      unimplemented. Real semantic runtime evidence must be tracked separately
      from export and vanilla reload evidence.
    evidence: ["sand-core/src/events/mod.rs (SameCycleEventGroup, SameCycleEventRequirement, compose/after/after_any/after_all)", "sand-core/src/events/graph.rs (OccurrenceDependency, staged topological composition, validation)", "sand-core/src/component.rs (__sand_event_cycle occurrence-state lowering and detector reuse)", "sand-core/tests/event_multi_parent_export.rs", "sand-core/tests/event_multi_parent_occurrence_collision.rs", "sand-core/src/events/graph.rs (multi-parent graph tests)", "sand-macros/tests/cases/pass_sand_event_multi_parent_dispatch.rs", "sand-macros/tests/cases/fail_sand_event_after_any_empty.rs", "sand-macros/tests/cases/fail_sand_event_after_any_arity_nine.rs", "sand-macros/tests/cases/fail_sand_event_after_all_non_event.rs", "sand-vanilla-audit/src/lib.rs (SemanticAfterAny/SemanticAfterAll)", "scripts/vanilla-semantic-client/client.cjs"]
    documentation: ["docs/events.md", "book/src/manual/events.md", "docs/architecture.md"]

  - id: sandevent-bounded-correlation
    name: "Bounded cross-tick SandEvent correlation"
    category: events
    intent: "Require a typed parent SandEvent to have fired for the same inherited subject during the current cycle or within a bounded number of prior completed tick boundaries, without an unbounded historical event log."
    status: partial
    stability: alpha
    crates: [sand-core, sand-macros]
    entry_points: ["ChainEventDispatch::within::<E>(TickWindow)", "TickWindow::new(u32)"]
    preferred_api: "SandEventDispatch::compose().after::<Current>().within::<Prior>(TickWindow::new(N)?) inside SandEvent::dispatch(); combine with while_, when, and unless as needed"
    sand_limitations: >
      Phase 5 of #240. `within::<E>(TickWindow::new(N)?)` holds when `E` fired
      for the same subject during the current cycle or within the previous
      `N - 1` completed tick boundaries: tracking an integer age (ticks since
      `E` last fired, reset to 0 the cycle `E` fires), the window holds while
      `age <= N - 1`. `N = 1` is therefore identical to `after::<E>()`. A new
      occurrence always refreshes the window regardless of remaining age; a
      bounded parent occurrence never directly dispatches the child — the
      child still coalesces per existing same-cycle rules, and repeated parent
      occurrences refresh state rather than queueing deliveries. `TickWindow`
      rejects 0 and windows above 24,000 ticks (20 minutes); it is not a
      session/persistence mechanism. Distinct concrete parent types compose
      conjunctively; a repeated `.within` call for the same parent and window
      is deduplicated, a conflicting window for the same parent is rejected.
      The bounded parent's own detector/setup is generated and shared exactly
      once regardless of how many children or distinct windows reference it —
      distinct windows against the same parent share one exact per-subject age
      objective (`se_{key}_wa`) rather than one lossy objective per window.
      Age-counter maintenance runs exactly once per bounded parent per tick,
      placed at the point that specific parent's own occurrence for this tick
      is fully committed — immediately after root-detector dispatch for a
      root or immediate-single-`after`-fast-path parent, or immediately after
      that parent's own staged evaluation call when the bounded parent is
      itself composed via `after_any`/`after_all`/`while_`/`within` — and
      always before any dependent staged child reads the counter. This
      guarantees a parent firing on the current tick always satisfies
      `within` regardless of prior age, and no child ever observes a stale
      age, even when the bounded parent is itself staged. Self-dependencies,
      advancement-backed parents,
      incompatible scopes, and direct/indirect mixed-edge cycles (including
      cycles through `while`/`after`/`after_any`/`after_all` edges) are
      rejected with a readable diagnostic path. State is keyed to `@s` (never
      a broad `@a`/`@e` selector for the mutating operation) so it cannot
      cross subjects. The age update executes under `execute as @a`, which
      only iterates online players, so age advances only while a player is
      online and pauses while they are offline; per Sand's existing
      scoreboard-state contract, the score itself is not reset by
      disconnect/reconnect or `/reload` (it persists in `scoreboard.dat` like
      `Cooldown`/`Timer`/`DamageTracker` state), so a returning player resumes
      aging from wherever their age stopped rather than restarting it — this
      is documented, not silently stronger than vanilla guarantees. The
      increment is guarded to stop at `TickWindow::MAX_TICKS` (24,000) rather
      than incrementing unboundedly: Minecraft scoreboard values are signed
      32-bit, and an unguarded add on a permanently-idle parent would
      eventually overflow and wrap negative, which would incorrectly
      re-satisfy `age <= N - 1` for every window until the parent fired
      again. Because `TickWindow::MAX_TICKS` is the largest representable
      window, an age that has reached it is already permanently expired for
      every valid window, so no additional objective or reset mechanism is
      needed to keep the sentinel itself semantically inert.
      Generated command shape, objective dedup, coordinator ordering, and
      cycle diagnostics have automated export/unit evidence. A real 1.21.4
      protocol-client fixture is prepared (SemanticWithin) proving the
      "clearly within," "refreshes," and "clearly expired" cases, but was not
      executed as part of this change (no live server in the authoring
      environment) — see LIM-VAL-006. Advancement-backed graph parents,
      participant contexts, and arbitrary non-player scopes remain
      unimplemented (Phase 6+).
    evidence: ["sand-core/src/events/mod.rs (TickWindow, TickWindowError, BoundedEventDependency, ChainEventDispatch::within)", "sand-core/src/events/graph.rs (BoundedDependency, bounded resolution/validation, bounded_parents)", "sand-core/src/component.rs (se_{key}_wa age-counter setup and coordinator maintenance)", "sand-core/tests/event_chain_within_export.rs", "sand-core/src/events/graph.rs (bounded graph tests)", "sand-macros/tests/cases/pass_sand_event_within_dispatch.rs", "sand-macros/tests/cases/fail_sand_event_within_non_sand_event_parent.rs", "sand-vanilla-audit/src/lib.rs (SemanticWithin)", "scripts/vanilla-semantic-client/client.cjs"]
    documentation: ["docs/events.md", "book/src/manual/events.md", "docs/architecture.md", "docs/vanilla-reload-validation.md"]

  - id: sandevent-persistent-conditions
    name: "Persistent SandEvent conditions"
    category: events
    intent: "Require a chained child event to observe an explicitly represented persistent state at the child dispatch boundary, without treating that state as a same-cycle occurrence."
    status: partial
    stability: alpha
    crates: [sand-core, sand-macros]
    entry_points: ["PersistentSandEvent", "PersistentEventCondition", "ChainEventDispatch::while_::<E>()"]
    preferred_api: "SandEventDispatch::chain::<Parent>().while_::<PersistentState>().when(...).unless(...)"
    sand_limitations: >
      Phase 3 of #240. Persistent state is an explicit opt-in contract and is
      evaluated live under the inherited player @s and position when the child
      edge is considered. It does not require the persistent event to fire,
      does not invoke its detector/setup, and is available on first
      observation. Multiple requirements are conjunctive and deduplicated;
      ordinary when/unless conditions compose through the same Condition IR.
      Built-in support covers current sneaking, sprinting, swimming, flying,
      on-fire, and Creative/Adventure/Spectator mode. Occurrence-only,
      transition, advancement, configurable item/equipment, and non-player
      state types do not implement the contract. Custom providers must have an
      empty SandEvent::setup() and independently provision prerequisites (for
      example through typed state lifecycle); non-empty setup is rejected with
      a child/provider diagnostic. Parent handlers run before
      child edges, so their mutations are visible to the live state query.
      Generated shape and multiplayer command scoping are tested. A real 1.21.4
      protocol-client fixture proves positive, negative, remaining-true,
      becoming-false, and repeated-firing sneaking cases for one player;
      two-player isolation and the other providers remain structural evidence.
    evidence: ["sand-core/src/events/mod.rs (PersistentSandEvent, PersistentEventCondition, ChainEventDispatch::while_)", "sand-core/src/events/graph.rs (PersistentDependency, provider setup validation, and mixed-edge validation)", "sand-core/src/component.rs (persistent condition lowering and recursive predicate reuse)", "sand-core/tests/event_chain_while_export.rs", "sand-core/tests/event_chain_while_provider_reuse.rs", "sand-core/tests/event_chain_identity_collision.rs", "sand-macros/tests/cases/pass_sand_event_while_dispatch.rs", "sand-macros/tests/cases/fail_sand_event_while_non_persistent.rs", "sand-vanilla-audit/src/lib.rs (SemanticOccurrenceWhileSneaking)", "scripts/vanilla-semantic-client/client.cjs"]
