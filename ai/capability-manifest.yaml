# Sand capability manifest — machine-readable capability inventory.
#
# Handwritten and reviewed alongside source (not code-generated). Do not
# treat absence of a capability id as evidence it doesn't exist — search
# source before assuming a gap. For exhaustive per-registry / per-trigger
# detail, this file points at the two Rust-owned coverage tables instead of
# duplicating them:
#   - sand-components/src/registry_coverage.rs  (REGISTRY_COVERAGE, TAG_COVERAGE)
#   - sand-components/src/advancement/trigger_coverage.rs (TRIGGER_COVERAGE)
#
# Status enum: implemented | partial | experimental | raw_only | planned |
#              intentionally_unsupported | vanilla_impossible | unknown
schema_version: 1
last_reviewed: "2026-07-15"

