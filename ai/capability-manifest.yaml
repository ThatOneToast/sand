  - id: events-typed
    name: "Typed event system (built-in events + advancement-backed triggers)"
    category: events
    intent: "React to gameplay events (join, death, respawn, combat, item use, block placement, equipment, and ~40 more) with a typed #[event] handler, or define custom event triggers backed by advancements/tick conditions."
    status: implemented
    stability: alpha
    crates: [sand-core, sand-macros]
    entry_points: ["#[event]"]
    preferred_api: "Use Event<T>::player() for AdvancementEvent-backed and generated tracked events; use a concrete unit marker handler for tick-only SandEvent types. Built-ins live under sand_core::events::* (OnJoinEvent, FirstJoinEvent, OnDeathEvent, OnRespawnEvent, ArmorEquipEvent, ItemConsumeEvent, BlockPlaceEvent, EntityKillEvent, ...)."
    advanced_api: "Implement sand_core::event::AdvancementEvent or sand_core::events::SandEvent on a marker type for custom triggers; sand_core::prelude (crate::event::*) for lower-level handle/trigger/builder access. See the sandevent-chained-dispatch capability for chaining a child SandEvent from a parent's same-cycle dispatch."
    sand_limitations: >
      Do not assume every advancement trigger exposes typed event payload
      values — Event<T> is runtime context, not a constructed T. Check
      trigger_coverage.rs's EventWrapperStatus (Supported/Partial/None) per
      trigger before relying on payload data. Prefer a built-in event type
      from sand_core::events (BUILTIN_EVENT_NAMES lists all of them) over
      hand-rolling an advancement + #[component(Load)] + revoke pattern —
      the scaffold generated by `sand new`/`sand init` uses Event<OnJoinEvent>
      for exactly this reason (fixed 2026-07-12; it previously hand-rolled
      join detection with a raw advancement).
    evidence: ["sand-core/src/events/mod.rs (BUILTIN_EVENT_NAMES)", "sand-core/src/event/{builder,handle,mod,trigger,vanilla}.rs", "sand-macros/src/lib.rs (#[event])"]
