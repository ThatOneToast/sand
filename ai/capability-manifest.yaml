  - id: item-snapshots
    name: "Immutable event-time item snapshots"
    category: items
    intent: "Capture an item's identity and data at a specific generated-command point, before a SandEvent handler or Sand-generated cleanup can observe a vanilla-mutated (consumed/moved/damaged) version of it, and expose that capture as immutable, storage-backed, typed data rather than a live re-read."
    status: partial
    stability: alpha
    crates: [sand-core]
    entry_points: ["ItemSnapshot::capture", "SnapshotSchema::new"]
    preferred_api: "ItemSnapshot::capture(&location, SnapshotSchema::new(storage, event_label), reliability) embedded into EventSetup::pre_observation (tick-backed) or the first lines of a handler body (advancement-backed)"
    sand_limitations: >
      #229 Phase 7. `capture()` always succeeds for a valid ItemLocation and
      emits exactly four commands: unconditional reset of `present`/`item`,
      then a presence-gated copy and presence-gated `present` mark sharing
      one identical guard. Absence is a runtime-checked typed `Condition`
      (`.is_present()`/`.is_absent()`), never encoded as `minecraft:air` and
      never an Option<ItemSnapshot> (Sand cannot know a runtime fact at
      export time). Typed field accessors (`.item_path()`, `.id_path()`,
      `.count_path()`, `.components_path()`) return `NbtPath`, composing
      with existing storage APIs; no raw NBT path strings are required in
      normal usage. Reliability is caller-declared, not inferred:
      `Exact` for tick-backed pre_observation captures (genuinely first,
      relative to Sand's own condition test), `ExactPostTrigger` for
      advancement-backed captures (earliest point Sand controls; vanilla's
      own pre-criterion mutation ordering is not verified — LIM-ITEM-003).
      `Correlated`/`Unavailable` are defined but not produced by `capture()`
      itself, reserved for future correlation work. Storage uses one
      deterministic path per event type (FNV-1a key from the type name,
      collision-free across event types and stable across repeated
      exports), not a per-player key — cross-player safety relies on
      Minecraft's own single-threaded, non-interleaved per-player
      `execute as @a` call-tree execution, documented explicitly rather than
      hidden (LIM-VAN-001 still applies: command storage itself is global).
      Snapshot lifetime is the capturing invocation and its synchronous
      descendant calls; nothing persists automatically across ticks.
      `.cleanup_commands()` is opt-in, not automatic. Not auto-wired into
      `#[event]` or the tick coordinator (LIM-ITEM-001); not supported at
      Phase 6 advancement-backed graph bridge parents (no EventSetup/handler
      seam exists there). Defines `ItemRole`/`EventItem` as the smallest
      stable seam for #230 to attach a role to a snapshot, without adding
      participant types (attacker/victim/etc.) or constructing them here.
      Does not implement attacker/victim, interacted-entity, or
      projectile/ammunition correlation (#230). Does not convert between
      `ItemMatcher` (predicate) and `ItemSnapshot` (captured data).
    evidence: ["sand-core/src/item/snapshot.rs", "sand-core/tests/item_snapshot_tick_capture_export.rs", "docs/items.md"]
    documentation: ["docs/items.md"]

  - id: participant-reliability-model
    name: "Typed participant reliability, availability, and lifetime model"
    category: events
    intent: "Establish the public type system for how strong the evidence is for an event participant (attacker, victim, interacted entity, item, location), whether it's available at all, and how long a reference stays meaningful, before implementing any participant-recovery backend."
    status: partial
    stability: alpha
    crates: [sand-core]
    entry_points: ["ParticipantReliability", "ParticipantAvailability", "ParticipantUnavailableReason", "ParticipantLifetime", "PlayerParticipant::subject", "EntityParticipant::subject", "EntityParticipant::correlated", "EntityParticipant::inferred"]
    preferred_api: "PlayerParticipant::subject()/EntityParticipant::subject() for the event's own exact subject; EntityParticipant::correlated/inferred plus .require(floor)/.require_exact() for anything weaker; ParticipantAvailability<T> for optional/unsupported participants"
    sand_limitations: >
      #230 Phase 8. `ParticipantReliability` (`Unavailable < Inferred <
      Correlated < ExactSnapshot < Exact`, declared weakest-first so the
      derived `Ord` is a strength ordering; `.meets(required)` is `self >=
      required`) is the single reliability vocabulary for every participant
      kind. `Exact` outranks `ExactSnapshot` by design: a live reference
      (e.g. `@s`) can still be traversed/re-queried, while a snapshot is
      deliberately frozen copied data — both are strong evidence answering
      different questions. Phase 7's `SnapshotReliability` is unchanged (no
      rename, no new variant) and gets an additive
      `.as_participant_reliability()`/`.item_evidence_qualifier()` mapping:
      both `Exact` and `ExactPostTrigger` map to the shared `ExactSnapshot`
      level (items are always copied, never referenced live) without
      losing the distinction between them — the qualifier preserves it.
      `ParticipantAvailability<T>` plus nine `ParticipantUnavailableReason`
      variants (`NotSuppliedByTrigger`, `UnsupportedVersion`,
      `UnsupportedBackend`, `AmbiguousCandidates`, `CorrelationExpired`,
      `NoMatchingObservation`, `NotApplicable`, `ItemSourceAlreadyMutated`,
      `LifetimeExpired`) keep "unsupported"/"ambiguous"/"expired"
      distinguishable from an event-semantic `Option::None`, never
      collapsed into it. `ParticipantLifetime` (`Invocation <
      SynchronousDescendants < EventCycle`, `.covers(needed)` following the
      same ordering pattern) documents — not compiler-enforces, since
      participant references are generated-command concepts, not Rust-owned
      values — how long a reference stays meaningful. `PlayerParticipant`/
      `EntityParticipant` are command-building handles, not live runtime
      data; the only exact constructor either provides is `subject()` (the
      event's own triggering/polled player) — there is no API path to
      construct a non-subject participant claiming `Exact` (LIM-CTX-003).
      `EntityParticipantRole` (`Subject`, `Actor`, `Attacker`,
      `DirectAttacker`, `Victim`, `Killer`, `Target`, `InteractedEntity`,
      `Projectile`, `ProjectileOwner`) and `LocationParticipantRole`
      (`EventBlock`) are new; `ItemParticipantRole` reuses Phase 7's
      `ItemRole` directly rather than duplicating it. Does not implement
      any participant-recovery backend (#230 Phase 9): no attacker/victim/
      interacted-entity/projectile-owner observation, no bounded
      correlation tracker, no automatic item snapshots.
    evidence: ["sand-core/src/participant/reliability.rs", "sand-core/src/participant/availability.rs", "sand-core/src/participant/lifetime.rs", "sand-core/src/participant/role.rs", "sand-core/src/participant/reference.rs", "docs/event-context.md"]
    documentation: ["docs/event-context.md"]

