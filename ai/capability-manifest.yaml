    intent: "Give every SandEvent type a deterministic, structural description of what participants it can promise, and define how that description propagates and merges through the existing same-cycle/persistent/bounded/advancement-bridge composition surface — without adding a new participant-recovery backend."
    status: partial
    stability: alpha
    crates: [sand-core]
    entry_points: ["EventContextCapabilities::for_event", "EventContextCapabilities::validate", "propagate_after", "merge_after_any", "merge_after_all", "propagate_while", "propagate_when_unless", "propagate_within"]
    preferred_api: "EventContextCapabilities::for_event::<E>() for a directly-dispatched event's own capabilities; the propagate_*/merge_* functions in sand_core::participant::capabilities to combine parent capabilities explicitly for a known chained composition"
    sand_limitations: >
      #230 Phase 8. `EventContextCapabilities` is `'static`-only (`Copy`
      enums, `&'static` slices — no `TypeId`-derived identity, deterministic
      and comparable, safe for generic event monomorphizations; distinct
      generic instantiations of one event family compute the same,
      structurally-equal value). `for_event::<E: SandEvent>()` derives it
      from `E::dispatch()`: `AdvancementTrigger`/legacy `TickCondition` and
      `Tick` dispatch with a player-subject `TickScope` (`Players` or
      Phase 6's `AdvancementPlayer`) resolve to an exact player subject;
      everything else resolves to `EventContextCapabilities::NONE`. It does
      **not** resolve `SandEventDispatch::Chain` generically — a
      `ChainEventDispatch`'s parent(s) are identified by type-erased
      function-pointer factories so the parent marker type never needs
      instantiating, which means `for_event` cannot call
      `for_event::<Parent>()` from inside an already-erased dispatch value
      (LIM-CTX-001). `.validate()` rejects a descriptor declaring the same
      role twice. Six pure propagation/merge functions cover the existing
      composition surface: `propagate_after` (single-parent `after`,
      including Phase 6 advancement bridges — child's lifetime widens to at
      least `SynchronousDescendants`), `merge_after_any`/`merge_after_all`
      (require identical subject scope across the group, reliability
      degrades to the group's weakest member, order-independent, empty/
      incompatible input rejected via `ContextMergeError` rather than
      guessed), `propagate_while`/`propagate_when_unless` (identity — a
      condition never adds/removes participant capability),
      `propagate_within` (downgrades reliability to at most `Correlated`
      and lifetime to `EventCycle`, since a bounded correlation crosses
      tick boundaries and nothing captured at the original synchronous
      invocation survives that). These functions operate on
      `SubjectCapability` only — nothing yet merges non-subject
      entity/item/location capability lists (there is nothing to merge:
      LIM-CTX-002), and nothing wires them into the event graph exporter
      automatically (LIM-CTX-004) — a caller invokes them explicitly today.
      A table-driven audit (`participant_context_capability_audit.rs`)
      confirms every currently supported `SandEvent` family gets an exact
      player subject and empty entity/item/location lists — no
      participant-recovery backend exists for any of them yet.
