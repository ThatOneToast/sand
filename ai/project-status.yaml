# Sand project status — machine-readable source of truth.
#
# This file is handwritten and reviewed alongside source changes; it is not
# code-generated. See ai/maintenance.md for the update checklist. It records
# repo-level status only; per-feature status lives in capability-manifest.yaml.
schema_version: 1
last_reviewed: "2026-07-16"

sand:
  version: "0.1.0"
  maturity: alpha
  maturity_statement: >
    Sand is in alpha dogfooding stage (ROADMAP.md). Core attribute-first
    authoring (#[function], #[component(Load|Tick)], typed state, typed
    condition, typed execute, typed text, generated command builders,
    scaffold) is stable. Event system, dialogs, and resource-pack generation
    are alpha. mcfunction! macro and generated registries for unreleased
    Minecraft versions are experimental. See RELEASE.md "Stability levels".
  evidence:
    - ROADMAP.md
    - RELEASE.md

distribution:
  crates_io: not_published
  install_method: "build from workspace: cargo build -p sand --release"
  evidence:
    - RELEASE.md
    - README.md

minecraft_support:
  supported_range:
    minimum: "1.18.0"
    maximum_verified: "26.2.0"
  pack_format_table_source: sand-core/src/version.rs (VersionProfile::lookup, ~line 513-742)
  unknown_or_future_versions: >
    VersionProfile::resolve() never errors; unknown/future versions get a
    conservative fallback (VersionCaps::conservative(): all capability flags
    false, is_fallback: true, pinned to the latest known pack formats).
    VersionProfile::resolve_strict() additionally rejects fallback
    resolutions with VersionError::UnknownVersion, for CI/release use.
  evidence:
    - sand-core/src/version.rs
    - sand-version/src/lib.rs (LATEST_KNOWN = "26.2")

cli:
  binary: sand
  commands:
    new: {status: implemented, evidence: "sand/src/main.rs cmd_new"}
    init: {status: implemented, evidence: "sand/src/main.rs cmd_init"}
    build: {status: implemented, evidence: "sand/src/build/mod.rs"}
    run: {status: implemented, evidence: "sand/src/run_cmd.rs"}
    clean: {status: implemented, evidence: "sand/src/main.rs cmd_clean"}
    version: {status: implemented, evidence: "sand/src/main.rs"}
    add_resourcepack: {status: implemented, evidence: "sand/src/add_cmd.rs run_resourcepack"}
    join: {status: stub, evidence: "sand/src/join_cmd.rs:17-19 — parses sand.toml, --local branch is a TODO no-op"}

stable_areas:
  - "#[function], #[component(Load)], #[component(Tick)] proc macros"
  - "Typed state: ScoreVar<T>, Flag, Cooldown, StorageVar<T>, Timer"
  - "Typed conditions: all!, any!, Condition::*"
  - "Typed execute: TypedExecute, ExecuteExt::when/unless"
  - "Typed text: Text, Actionbar, Title, Bossbar"
  - "Generated typed command builders (from commands.json)"
  - "sand new / sand init attribute-first scaffold"
evidence: [ROADMAP.md, RELEASE.md]

experimental_or_alpha_areas:
  - area: "Event system"
    status: alpha
    note: "Canonical AdvancementEvent/SandEvent split with same-cycle and explicit player-scoped persistent composition; later correlation and context phases remain planned."
  - area: "Dialog components and dialog command helpers"
    status: alpha
  - area: "Resource pack generation and HUD workflows"
    status: alpha
    note: "Functional but requires manual setup (ROADMAP.md); see sand-resourcepack crate."
  - area: "mcfunction! macro"
    status: experimental
    note: "Positioned as advanced tooling, not the beginner path."
  - area: "Generated registry coverage for unreleased Minecraft 26.x point releases"
    status: experimental

test_and_validation_status:
  rust_unit_and_golden_tests:
    status: passing_at_last_review
    approx_test_count: 1038
    approx_files_referencing_golden: 89
    evidence: "cargo test --workspace --all-features; sand-core/src, sand-components/src golden export tests"
  macro_trybuild_tests:
    status: passing_at_last_review
    evidence: "cargo test -p sand-macros"
  vanilla_server_reload_validation:
    status: scheduled_and_manual
    note: >
      scripts/validate-vanilla-reload.sh drives a real vanilla server and
      checks initial load and /reload, including explicit detection of vanilla
      "Couldn't parse data file" worker errors. It is NOT part of default
      `cargo test` and requires a downloaded server jar (network + Java). A
      scheduled/workflow-dispatch GitHub Actions workflow runs both verified
      profiles. Passing reload proves parsing, not gameplay semantics; the
      separate 1.21.4 protocol-client fixture verifies placement, item-use,
      and single-player persistent sneaking composition semantics.
    last_local_run: "2026-07-16: profile load/reload passed on 1.21.4 and 26.2; semantic placement/item-use and persistent sneaking fixture passed on 1.21.4"
    evidence:
      - scripts/validate-vanilla-reload.sh
      - scripts/validate-vanilla-semantics.sh
      - docs/vanilla-reload-validation.md
  doc_link_validation:
    status: implemented
    evidence: scripts/check-docs.py
  registry_drift_fixtures:
    status: implemented
    note: >
      sand-components/src/registry_coverage.rs tests compare REGISTRY_COVERAGE
      against checked-in Mojang datapack.json fixtures for 1.21.4 and 26.2.
    evidence: "sand-components/fixtures/registry-coverage/*.json"

known_incomplete_top_level_features:
  - "Worldgen registries (configured_feature, structure, structure_set, processor_list, template_pool, density_function, noise, configured_carver): no typed module, RawComponent only."
  - "dimension_type registry: no typed module."
  - "enchantment_provider registry (1.21+): no typed module."
  - "Complex loot table pool conditions/entry types: partial."
  - "Full predicate coverage (location/weather/time): partial."
  - "Full item modifier set: partial."
  - "sand join --local: stub, no-op."
  - "crates.io publishing: not available."

relevant_source_paths:
  cli: sand/src
  core: sand-core/src
  command_builders: sand-commands/src
  datapack_components: sand-components/src
  macros: sand-macros/src
  build_pipeline: sand-build/src
  resourcepack: sand-resourcepack/src
  version_profiles: sand-core/src/version.rs
  version_constants: sand-version/src/lib.rs
  registry_coverage_table: sand-components/src/registry_coverage.rs
  trigger_coverage_table: sand-components/src/advancement/trigger_coverage.rs

verification_method: >
  Status values in this file and in capability-manifest.yaml are derived from
  reading current source, tests, and the two coverage tables above — not from
  ROADMAP.md/CHANGELOG.md/historical audit docs, which may lag behind source.
  Where repository documents disagreed with source during the 2026-07-12
  review, the conservative (source-backed) status was recorded here and the
  disagreement was logged in ai/known-limitations.md.
